figure: kd-gat

components:
  input:   { type: graph, n: 5, topology: sparse, color: data, labels: auto, scale: 50 }
  gat_t:   { type: box, label: "GAT Teacher", color: gat, width: 120, height: 40 }
  class_t: { type: box, label: "Classifier", color: gat, width: 100 }
  gat_s:   { type: box, label: "GAT Student", color: gat, width: 120, height: 40 }
  class_s: { type: box, label: "Classifier", color: gat, width: 100 }

layout:
  type: hstack
  gap: 60
  children:
    - input
    - type: vstack
      gap: 80
      children:
        - type: pipeline
          elements: [gat_t, class_t]
          gap: 50
          flowColor: gat
        - type: pipeline
          elements: [gat_s, class_s]
          gap: 50
          flowColor: gat

bridges:
  - { from: input_0, to: gat_t, type: flow, color: grey }
  - { from: input_0, to: gat_s, type: flow, color: grey }
  - { from: gat_t, to: gat_s, type: kd, color: kd, label: KD }

assertions:
  checks:
    - "gat_t: above gat_s"
    - "gat_t: left-of class_t"
