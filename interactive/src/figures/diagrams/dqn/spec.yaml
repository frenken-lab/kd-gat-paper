figure: dqn

components:
  # State inputs (from VGAE and GAT experts)
  recon:  { type: box, label: "Recon Error",  color: vgae, width: 90, height: 30 }
  logits: { type: box, label: "GAT Logits",   color: gat,  width: 90, height: 30 }
  concat: { type: box, label: "State s",      color: dqn,  width: 70, height: 28 }

  # Q-network (online)
  fc1:   { type: box, label: "FC₁ (64)",  color: dqn, width: 80, height: 28 }
  relu:  { type: box, label: "ReLU",      color: dqn, width: 60, height: 24 }
  fc2:   { type: box, label: "FC₂ (32)",  color: dqn, width: 80, height: 28 }
  qvals: { type: box, label: "Q(s, α)",   color: dqn, width: 80, height: 28 }

  # Output
  alpha: { type: box, label: "α ∈ [0,1]", color: dqn, width: 90, height: 30 }

  # Auxiliary
  target: { type: box, label: "Target Net θ⁻", color: dqn,  width: 110, height: 28 }
  replay: { type: box, label: "Replay Buffer",  color: data, width: 110, height: 30 }
  reward: { type: box, label: "Reward r",       color: data, width: 80,  height: 26 }

layout:
  type: hstack
  gap: 50
  children:
    # State inputs
    - type: vstack
      gap: 30
      align: center
      children: [recon, logits]
    # Concat
    - concat
    # Q-network pipeline
    - type: pipeline
      elements: [fc1, relu, fc2, qvals]
      gap: 40
      flowColor: dqn
      container: { label: "Q-Network θ", color: dqn }
    # Output
    - alpha
    # Side: target, replay, reward
    - type: vstack
      gap: 40
      align: center
      children: [target, replay, reward]

bridges:
  # State inputs → concat
  - { from: recon,  to: concat, type: flow, color: vgae }
  - { from: logits, to: concat, type: flow, color: gat }
  # Concat → Q-network
  - { from: concat, to: fc1, type: flow, color: dqn }
  # Q-values → action selection
  - { from: qvals, to: alpha, type: flow, color: dqn, label: "argmax" }
  # Target network periodic sync
  - { from: fc2, to: target, type: kd, color: dqn, label: "sync θ⁻" }
  # Replay buffer feeds training
  - { from: replay, to: fc1, type: flow, color: data, style: dashed, label: "sample" }
  # Reward → replay
  - { from: reward, to: replay, type: flow, color: data, style: dashed }
  # Alpha → reward (environment feedback loop)
  - { from: alpha, to: reward, type: flow, color: data, style: dashed, label: "detect" }

assertions:
  checks:
    - "recon: left-of concat"
    - "logits: left-of concat"
    - "concat: left-of fc1"
    - "qvals: left-of alpha"
