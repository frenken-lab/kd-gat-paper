figure: kd-vgae

components:
  input:   { type: graph, n: 5, topology: sparse, color: data, labels: auto, scale: 50 }
  vgae_t:  { type: box, label: "VGAE Teacher", color: vgae, width: 130, height: 40 }
  recon_t: { type: box, label: "Reconstruction", color: vgae, width: 120 }
  vgae_s:  { type: box, label: "VGAE Student", color: vgae, width: 130, height: 40 }
  recon_s: { type: box, label: "Reconstruction", color: vgae, width: 120 }

layout:
  type: hstack
  gap: 60
  children:
    - input
    - type: vstack
      gap: 80
      children:
        - type: pipeline
          elements: [vgae_t, recon_t]
          gap: 50
          flowColor: vgae
        - type: pipeline
          elements: [vgae_s, recon_s]
          gap: 50
          flowColor: vgae

bridges:
  - { from: input_0, to: vgae_t, type: flow, color: grey }
  - { from: input_0, to: vgae_s, type: flow, color: grey }
  - { from: vgae_t, to: vgae_s, type: kd, color: kd, label: KD }

assertions:
  checks:
    - "vgae_t: above vgae_s"
    - "vgae_t: left-of recon_t"
