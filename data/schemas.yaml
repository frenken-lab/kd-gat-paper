# Single source of truth for paper data validation.
# Read by: pull_data.py (this repo), export_paper_data.py (KD-GAT repo)

csv:
  main_results.csv:
    columns: [model, accuracy, precision, recall, f1, auc, specificity, mcc]
    min_rows: 1
  test_results.csv:
    columns: [model, scenario, accuracy, f1]
    min_rows: 1
  vgae_threshold.csv:
    columns: [metric, value]
    min_rows: 1
  literature_baselines.csv:
    columns: [model, accuracy, precision, recall, f1, auc, citation_key]
    min_rows: 1
  # New (from buckeyeguy/graphids-kd-gat ablation bundle, metric=f1_macro).
  # Generated by tools/pull_data.py from the metrics/ bucket. Schema mirrors
  # the upstream parquet — `mean` is the f1_macro mean per metadata.json.
  leaderboard.csv:
    columns: [variant, n_seeds, mean, ci_low, ci_high, group, dataset]
    min_rows: 1
  effect_size.csv:
    columns: [variant_a, variant_b, mean_diff, cohens_d, diff_ci_low, diff_ci_high, n_seeds_a, n_seeds_b, group, dataset]
    min_rows: 1
  expected_max.csv:
    columns: [variant, n_seeds, expected_max, group, dataset]
    min_rows: 1
  tie_candidates.csv:
    columns: [variant_a, variant_b, mean_a, mean_b, gap, n_seeds_a, n_seeds_b, group, dataset]
    min_rows: 1

# Figure data.json contracts — export ships plot-ready data,
# figures are dumb renderers (load + plot, no transforms).
json:
  umap:
    type: object
    required_keys: [points, bounds, metrics]
    # points: [{x, y, label, attack_type}] — every GAT embedding; svelteplot's
    #         <Density> + densityX/Y compute KDE/contours/marginals client-side.
    # bounds: {x1, y1, x2, y2} — pinned Plot domain so toggling classes doesn't
    #         reflow the axes.
    # metrics: {overlap_integral, wasserstein_2d, energy_distance} — class separability.

  reconstruction:
    type: object
    required_keys: [kde, heatmap, roc]
    # kde: [{value, component, class}] — pre-flattened for histograms
    # heatmap: [{row, component, value}] — sorted by composite error, sampled
    # roc: [{fpr, tpr, component}] — pre-computed per component

  fusion:
    type: array
    item_keys: [alpha, label, attack_type]
    min_items: 10

  cka:
    type: object
    required_keys: [matrix, teacher_layers, student_layers]

  attention:
    type: array
    item_keys: [graph_idx, label, nodes, edges]
    min_items: 1
    # nodes have pre-computed x, y from force layout

  results-table:
    type: array
    item_keys: [model, group, accuracy, precision, recall, f1, auc]
    min_items: 3

# Input schema — expected columns in HF parquet files
# (buckeyeguy/graphids-kd-gat). The new ablation-set bundle (metric=f1_macro)
# replaced the old buckeyeguy/GraphIDS multi-metric layout on 2026-04-28.
# Read by: pull_data.py (this repo) for input validation at pull time.
input:
  metrics/leaderboard.parquet:
    columns: [variant, n_seeds, mean, ci_low, ci_high, group, dataset]
  metrics/effect_size.parquet:
    columns: [variant_a, variant_b, mean_diff, cohens_d, diff_ci_low, diff_ci_high, n_seeds_a, n_seeds_b, group, dataset]
  metrics/expected_max.parquet:
    columns: [variant, n_seeds, expected_max, group, dataset]
  metrics/tie_candidates.parquet:
    columns: [variant_a, variant_b, mean_a, mean_b, gap, n_seeds_a, n_seeds_b, group, dataset]

file_map:
  csv/main_results.csv: data/csv/main_results.csv
  csv/test_results.csv: data/csv/test_results.csv
  csv/vgae_threshold.csv: data/csv/vgae_threshold.csv
  csv/leaderboard.csv: data/csv/leaderboard.csv
  csv/effect_size.csv: data/csv/effect_size.csv
  csv/expected_max.csv: data/csv/expected_max.csv
  csv/tie_candidates.csv: data/csv/tie_candidates.csv
  figures/umap/data.json: interactive/src/figures/data/umap/data.json
  figures/reconstruction/data.json: interactive/src/figures/data/reconstruction/data.json
  figures/fusion/data.json: interactive/src/figures/data/fusion/data.json
  figures/cka/data.json: interactive/src/figures/data/cka/data.json
  figures/attention/data.json: interactive/src/figures/data/attention/data.json
  figures/results-table/data.json: interactive/src/figures/data/results-table/data.json
