# Single source of truth for paper data validation.
# Read by: pull_data.py (this repo), export_paper_data.py (KD-GAT repo)

csv:
  main_results.csv:
    columns: [model, accuracy, precision, recall, f1, auc, specificity, mcc]
    min_rows: 1
  test_results.csv:
    columns: [model, scenario, accuracy, f1]
    min_rows: 1
  vgae_threshold.csv:
    columns: [metric, value]
    min_rows: 1
  literature_baselines.csv:
    columns: [model, accuracy, precision, recall, f1, auc, citation_key]
    min_rows: 1

# Figure data.json contracts — export ships plot-ready data,
# figures are dumb renderers (load + plot, no transforms).
json:
  umap:
    type: array
    item_keys: [x, y, label, attack_type]
    min_items: 50

  reconstruction:
    type: object
    required_keys: [kde, heatmap, roc]
    # kde: [{value, component, class}] — pre-flattened for histograms
    # heatmap: [{row, component, value}] — sorted by composite error, sampled
    # roc: [{fpr, tpr, component}] — pre-computed per component

  fusion:
    type: array
    item_keys: [alpha, label, attack_type]
    min_items: 10

  cka:
    type: object
    required_keys: [matrix, teacher_layers, student_layers]

  attention:
    type: array
    item_keys: [graph_idx, label, nodes, edges]
    min_items: 1
    # nodes have pre-computed x, y from force layout

file_map:
  csv/main_results.csv: data/csv/main_results.csv
  csv/test_results.csv: data/csv/test_results.csv
  csv/vgae_threshold.csv: data/csv/vgae_threshold.csv
  figures/umap/data.json: interactive/src/figures/umap/data.json
  figures/reconstruction/data.json: interactive/src/figures/reconstruction/data.json
  figures/fusion/data.json: interactive/src/figures/fusion/data.json
  figures/cka/data.json: interactive/src/figures/cka/data.json
  figures/attention/data.json: interactive/src/figures/attention/data.json
