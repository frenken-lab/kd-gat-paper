# Table specifications — defines how raw CSVs become paper tables.
# Run: python scripts/tables/build.py
# Output: data/tables/*.md (included by content/*.md via {include})

main_results:
  title: "Test Performance on HCRL Car-Hacking Dataset"
  label: tbl-main-results
  source: csv/main_results.csv
  columns:
    model: Model
    accuracy: Accuracy
    precision: Precision
    recall: Recall
    f1: F1
    auc: AUC
  format:
    accuracy: "{:.4f}"
    precision: "{:.4f}"
    recall: "{:.4f}"
    f1: "{:.4f}"
    auc: "{:.4f}"
  sort_by: [model]
  baselines:
    - model: BEPCD
      accuracy: 0.9800
      precision: 0.9700
      recall: 0.9800
      f1: 0.9700
      auc: 0.9900
      source: literature
    - model: HyDL-IDS
      accuracy: 0.9910
      precision: 0.9900
      recall: 0.9910
      f1: 0.9900
      auc: 0.9970
      source: literature

test_scenarios:
  title: "Cross-Scenario Test Results"
  label: tbl-test-scenarios
  source: csv/test_results.csv
  columns:
    model: Model
    scenario: Scenario
    accuracy: Accuracy
    f1: F1
    precision: Precision
    recall: Recall
  format:
    accuracy: "{:.4f}"
    f1: "{:.4f}"
    precision: "{:.4f}"
    recall: "{:.4f}"

vgae_threshold:
  title: "VGAE Anomaly Detection Threshold Analysis"
  label: tbl-vgae-threshold
  source: csv/vgae_threshold.csv
  columns:
    metric: Metric
    value: Value
  format:
    value: "{:.6f}"
