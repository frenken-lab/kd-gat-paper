name: Paper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml "bibtexparser>=2.0.0b7"
      - run: python data/validate.py
      - run: python references/validate.py

  figures:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: cd interactive && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: figures, path: "_build/figures/*.html" }

  build:
    runs-on: ubuntu-latest
    needs: figures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { name: figures, path: _build/figures/ }

      - run: pip install pyyaml tabulate

      # Build MyST site AST (needed by TMLR serializer)
      - name: Build MyST AST
        run: npm install -g mystmd && myst build --site

      # Build public site (with author names)
      - name: Build site
        run: python export/tmlr/build.py --output _build/submission/

      # Merge into author kit for Jekyll
      - name: Merge with TMLR author kit
        run: |
          cp _build/submission/submission.md tmlr_do_not_modify/_under_review/submission.md
          cp -r _build/submission/assets/* tmlr_do_not_modify/assets/ 2>/dev/null || true

      # Build anonymous submission artifact
      - name: Build anonymous submission
        if: github.ref == 'refs/heads/main'
        run: python export/tmlr/build.py --output _build/submission_anon/ --anonymous

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with: { name: tmlr-submission, path: _build/submission_anon/ }

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: figures, path: _build/figures/ }

      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml tabulate

      # Build MyST AST → Distill markdown
      - name: Build MyST AST
        run: npm install -g mystmd && myst build --site
      - name: Build Distill site
        run: python export/tmlr/build.py --output _build/submission/

      # Merge into author kit
      - name: Merge with TMLR author kit
        run: |
          cp _build/submission/submission.md tmlr_do_not_modify/_under_review/submission.md
          cp -r _build/submission/assets/* tmlr_do_not_modify/assets/ 2>/dev/null || true

      # Build Jekyll
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.2" }
      - name: Build Jekyll site
        run: |
          cd tmlr_do_not_modify
          bundle install
          bundle exec jekyll build --baseurl "/kd-gat-paper"

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: tmlr_do_not_modify/_site/ }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Build candidacy PDF
      - name: Install Typst
        run: |
          curl -fsSL https://typst.community/typst-install/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build candidacy PDF
        run: myst build --pdf --config myst.candidacy.yml
      - uses: actions/upload-artifact@v4
        with: { name: candidacy-pdf, path: _build/exports/candidacy-report.pdf }

      - name: Deploy candidacy to curve.space
        env:
          CURVENOTE_TOKEN: ${{ secrets.CURVENOTE_TOKEN }}
        run: |
          cp myst.yml myst.yml.paper
          cp myst.candidacy.yml myst.yml
          npx -y curvenote deploy --yes
          mv myst.yml.paper myst.yml
