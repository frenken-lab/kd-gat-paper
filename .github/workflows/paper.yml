name: Paper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml "bibtexparser>=2.0.0b7"
      - run: python scripts/pull_data.py --from-repo
      - run: python scripts/validate_bib.py

  figures:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: cd interactive && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: figures, path: "figures/*.html" }

  deploy-figures:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: figures
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with: { name: figures, path: figures/ }
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: figures/ }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: figures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { name: figures, path: figures/ }

      - run: pip install pyyaml tabulate
      - name: Build MyST site
        run: npm install -g mystmd && myst build

      - name: Convert TMLR
        if: github.ref == 'refs/heads/main'
        run: python scripts/tmlr/build.py --output submission_folder/ --anonymous

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with: { name: tmlr-submission, path: submission_folder/ }

      - name: Deploy to curve.space
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CURVENOTE_TOKEN: ${{ secrets.CURVENOTE_TOKEN }}
        run: npx -y curvenote deploy --yes
