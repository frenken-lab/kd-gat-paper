name: Paper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python scripts/pull_data.py --from-repo
      - run: python scripts/validate_bib.py

  figures:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: cd interactive && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: figures, path: "figures/*.html" }

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: figures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { name: figures, path: figures/ }

      - name: Build MyST site
        run: npm install -g mystmd && myst build

      - name: Convert TMLR
        if: github.ref == 'refs/heads/main'
        run: python scripts/tmlr/build.py --output submission_folder/ --anonymous
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with: { name: tmlr-submission, path: submission_folder/ }

      - name: Deploy to Curvenote
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          CURVENOTE_TOKEN: ${{ secrets.CURVENOTE_TOKEN }}
        run: npm install -g @curvenote/cli && curvenote deploy --yes
