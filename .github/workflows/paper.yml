name: Paper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pyyaml "bibtexparser>=2.0.0b7"
      - run: python data/validate.py
      - run: python references/validate.py

  figures:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: interactive/package-lock.json }
      - run: cd interactive && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with: { name: figures, path: "_build/figures/*.html" }

  # Build MyST site AST + TMLR exports (shared by deploy-pages and tmlr-submission)
  build:
    runs-on: ubuntu-latest
    needs: figures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/download-artifact@v4
        with: { name: figures, path: _build/figures/ }

      - run: pip install pyyaml tabulate
      - name: Build MyST AST
        run: npm install -g mystmd && myst build --site
      - name: Build TMLR submission (public)
        run: python export/tmlr/build.py --output _build/submission/
      - name: Merge with TMLR author kit
        run: |
          cp _build/submission/submission.md tmlr_do_not_modify/_under_review/submission.md
          cp -r _build/submission/assets/* tmlr_do_not_modify/assets/ 2>/dev/null || true

      # Build anonymous submission artifact
      - name: Build TMLR submission (anonymous)
        if: github.ref == 'refs/heads/main'
        run: python export/tmlr/build.py --output _build/submission_anon/ --anonymous
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with: { name: tmlr-submission, path: _build/submission_anon/ }

      # Upload merged author kit for deploy-pages
      - uses: actions/upload-artifact@v4
        with: { name: tmlr-site, path: tmlr_do_not_modify/ }

  # ---- Deploy jobs (main branch only, run in parallel) ----

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with: { name: tmlr-site, path: tmlr_do_not_modify/ }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: "3.2" }
      - name: Build Jekyll site
        run: |
          cd tmlr_do_not_modify
          bundle install
          bundle exec jekyll build --baseurl "/kd-gat-paper"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with: { path: tmlr_do_not_modify/_site/ }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  candidacy-pdf:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: figures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/download-artifact@v4
        with: { name: figures, path: _build/figures/ }
      - uses: typst-community/setup-typst@v4
      - name: Build candidacy PDF
        run: npm install -g mystmd && myst build --pdf --config myst.candidacy.yml
      - uses: actions/upload-artifact@v4
        with: { name: candidacy-pdf, path: _build/exports/candidacy-report.pdf }

  candidacy-site:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: figures
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/download-artifact@v4
        with: { name: figures, path: _build/figures/ }
      - uses: typst-community/setup-typst@v4
      - name: Deploy candidacy to curve.space
        env:
          CURVENOTE_TOKEN: ${{ secrets.CURVENOTE_TOKEN }}
        run: |
          cp myst.yml myst.yml.paper
          cp myst.candidacy.yml myst.yml
          npx -y curvenote deploy --yes
          mv myst.yml.paper myst.yml
