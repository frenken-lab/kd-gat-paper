name: Docs Freshness

on:
  schedule:
    - cron: "0 12 * * 1" # Weekly on Monday at noon UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # Full history for git log dates

      - name: Check docs freshness
        id: check
        run: |
          # Map each doc page to the source paths it documents.
          # If any source file was modified more recently than the doc,
          # the doc is considered stale.
          declare -A DOC_SOURCES
          DOC_SOURCES=(
            ["docs/Development-Setup.md"]="interactive/package.json Makefile myst.yml myst.candidacy.yml tools/validate_data.py"
            ["docs/Figure-Authoring.md"]="interactive/build.js interactive/vite.config.js interactive/src/lib/ interactive/package.json"
            ["docs/Architecture-Diagrams.md"]="interactive/src/lib/diagram/"
            ["docs/Data-Pipeline.md"]="data/schemas.yaml tools/validate_data.py data/csv/"
            ["docs/Table-Authoring.md"]="tools/tables/build.py tools/tables/spec.yaml"
            ["docs/Candidacy-Build.md"]="myst.candidacy.yml paper/candidacy/"
            ["docs/Deployment-and-CI.md"]=".github/workflows/paper.yml"
            ["docs/TMLR-Export.md"]="tools/tmlr/build.py"
          )

          STALE=""
          for doc in "${!DOC_SOURCES[@]}"; do
            if [ ! -f "$doc" ]; then
              continue
            fi

            doc_date=$(git log -1 --format="%ct" -- "$doc")

            for src in ${DOC_SOURCES[$doc]}; do
              if [ ! -e "$src" ]; then
                continue
              fi
              src_date=$(git log -1 --format="%ct" -- "$src")
              if [ "$src_date" -gt "$doc_date" ]; then
                src_rel=$(echo "$src" | sed 's|/$||')
                doc_name=$(basename "$doc" .md)
                STALE="${STALE}- **${doc_name}**: \`${src_rel}\` changed since doc was last updated\n"
                break
              fi
            done
          done

          if [ -n "$STALE" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            # Write to file to preserve newlines
            printf "%b" "$STALE" > /tmp/stale-docs.txt
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="The following docs may be outdated — source files they document have changed since the doc was last modified:

          $(cat /tmp/stale-docs.txt)

          Review each page and update if needed, then close this issue.

          *Auto-generated by docs-freshness CI.*"

          # Check for existing open issue
          EXISTING=$(gh issue list --label "docs-freshness" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Docs freshness: some pages may be stale" \
              --body "$BODY" \
              --label "docs-freshness"
          fi
