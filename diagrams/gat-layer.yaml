# GAT attention layer — pure YAML, neato layout, pinned positions
# Same organic shape in all three clusters, horizontally aligned
prog: neato
# neato doesn't support compound cluster clipping — use border nodes instead

components:
  # Stage 1: Input graph (undirected adjacency)
  - type: graph
    params:
      n: 5
      edges: sparse
      color: gat
      directed: false
      labels: ["h₁", "h₂", "h₃", "h₄", "h₅"]
      size: small
      id: input
      positions:
        - [1.86, 1.25]
        - [1.85, 0.25]
        - [0.94, 0.68]
        - [0.38, 1.60]
        - [1.29, 2.17]
    container:
      label: "Input: hᵥ"
      color: gat
      style: dashed

  # Stage 2: Attention (directed, per-edge weights)
  - type: graph
    params:
      n: 5
      edges: none
      color: attention
      directed: true
      labels: ["Wh₁", "Wh₂", "Wh₃", "Wh₄", "Wh₅"]
      size: small
      id: attn
      positions:
        - [4.86, 1.25]
        - [4.85, 0.25]
        - [3.94, 0.68]
        - [3.38, 1.60]
        - [4.29, 2.17]
    container:
      label: "Attention: αᵥᵤ"
      color: attention
      style: dashed

  # Stage 3: Output graph (undirected, updated features)
  - type: graph
    params:
      n: 5
      edges: sparse
      color: gat
      directed: false
      labels: ["h'₁", "h'₂", "h'₃", "h'₄", "h'₅"]
      size: small
      id: output
      positions:
        - [7.86, 1.25]
        - [7.85, 0.25]
        - [6.94, 0.68]
        - [6.38, 1.60]
        - [7.29, 2.17]
    container:
      label: "Output: h'ᵥ"
      color: gat
      style: dashed

edges:
  # Pipeline flow — rightmost node of source → leftmost node of target
  - {from: input.h₁, to: attn.Wh₄, style: dashed, label: "W, a", color: grey}
  - {from: attn.Wh₁, to: output.h'₄, style: dashed, label: "σ(Σα·Wh)", color: grey}

  # Attention edges — both directions, penwidth encodes α magnitude
  - {from: attn.Wh₁, to: attn.Wh₂, width: 1.5, color: "#B07AA16e"}
  - {from: attn.Wh₁, to: attn.Wh₃, width: 1.6, color: "#B07AA173"}
  - {from: attn.Wh₁, to: attn.Wh₅, width: 1.8, color: "#B07AA17c"}
  - {from: attn.Wh₂, to: attn.Wh₁, width: 1.6, color: "#B07AA172"}
  - {from: attn.Wh₂, to: attn.Wh₃, width: 1.1, color: "#B07AA15d"}
  - {from: attn.Wh₃, to: attn.Wh₁, width: 1.2, color: "#B07AA15f"}
  - {from: attn.Wh₃, to: attn.Wh₂, width: 2.5, color: "#B07AA19d"}
  - {from: attn.Wh₃, to: attn.Wh₄, width: 1.5, color: "#B07AA16e"}
  - {from: attn.Wh₄, to: attn.Wh₃, width: 1.8, color: "#B07AA17a"}
  - {from: attn.Wh₄, to: attn.Wh₅, width: 2.2, color: "#B07AA190"}
  - {from: attn.Wh₅, to: attn.Wh₁, width: 1.7, color: "#B07AA179"}
  - {from: attn.Wh₅, to: attn.Wh₄, width: 2.5, color: "#B07AA19d"}
