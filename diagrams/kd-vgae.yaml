# KD-VGAE: Teacher (enc=[5,3], latent=3) / Student (enc=[3,2], latent=2)
# neato layout: teacher at x_offset=0, student at x_offset=+8.0
prog: neato

# Position anchors
# full_5 base: 0=(0.38,0.73) 1=(1.54,0.62) 2=(0.92,0.25) 3=(0.66,1.39) 4=(1.38,1.32)
# full_3 base: 0=(0.38,1.11) 1=(1.38,1.12) 2=(0.88,0.25)
# Teacher: x_offset=0, Student: x_offset=+8.0

components:
  # ===== TEACHER (left side, x_offset = 0) =====

  # --- Teacher enc0: 5 fully-connected (y_offset = 0) ---
  - type: graph
    params:
      id: t_enc0
      n: 5
      edges: full
      color: vgae
      labels: none
      size: small
      positions: &t_full5_y0
        - [0.38, 0.73]
        - [1.54, 0.62]
        - [0.92, 0.25]
        - [0.66, 1.39]
        - [1.38, 1.32]

  # --- Teacher enc1: 3 fully-connected (y_offset = +3.0) ---
  - type: graph
    params:
      id: t_enc1
      n: 3
      edges: full
      color: vgae
      labels: none
      size: small
      positions: &t_full3_y3
        - [0.38, 4.11]
        - [1.38, 4.12]
        - [0.88, 3.25]

  # --- Teacher mu (row at y = 6.0) ---
  - type: graph
    params:
      id: t_mu
      n: 3
      edges: none
      color: purple
      labels: ["\u03bc\u2081", "\u03bc\u2082", "\u03bc\u2083"]
      size: small
      positions:
        - [0.30, 6.0]
        - [0.90, 6.0]
        - [1.50, 6.0]

  # --- Teacher sigma (row at y = 6.0, offset right) ---
  - type: graph
    params:
      id: t_sigma
      n: 3
      edges: none
      color: purple
      labels: ["\u03c3\u2081", "\u03c3\u2082", "\u03c3\u2083"]
      size: small
      positions:
        - [2.10, 6.0]
        - [2.70, 6.0]
        - [3.30, 6.0]

  # --- Teacher z (row at y = 8.0) ---
  - type: graph
    params:
      id: t_z
      n: 3
      edges: none
      color: dqn
      labels: ["z\u2081", "z\u2082", "z\u2083"]
      size: small
      positions:
        - [0.60, 8.0]
        - [1.20, 8.0]
        - [1.80, 8.0]

  # --- Teacher decoder (unpinned) ---
  - type: box
    params:
      id: t_dec
      label: "z\u1d40z"
      color: grey

  # --- Teacher reconstructed: 5 fully-connected (y_offset = +12.0) ---
  - type: graph
    params:
      id: t_recon
      n: 5
      edges: full
      color: vgae
      labels: none
      size: small
      positions:
        - [0.38, 12.73]
        - [1.54, 12.62]
        - [0.92, 12.25]
        - [0.66, 13.39]
        - [1.38, 13.32]

  # ===== STUDENT (right side, x_offset = +8.0) =====

  # --- Student enc0: 3 fully-connected (y_offset = 0, x_offset = +8.0) ---
  - type: graph
    params:
      id: s_enc0
      n: 3
      edges: full
      color: vgae
      labels: none
      size: small
      positions:
        - [8.38, 1.11]
        - [9.38, 1.12]
        - [8.88, 0.25]

  # --- Student enc1: 2 fully-connected (y_offset = +3.0, x_offset = +8.0) ---
  - type: graph
    params:
      id: s_enc1
      n: 2
      edges: full
      color: vgae
      labels: none
      size: small
      positions:
        - [8.58, 3.50]
        - [9.18, 3.50]

  # --- Student mu (row at y = 6.0, x_offset = +8.0) ---
  - type: graph
    params:
      id: s_mu
      n: 2
      edges: none
      color: purple
      labels: ["\u03bc\u2081", "\u03bc\u2082"]
      size: small
      positions:
        - [8.30, 6.0]
        - [8.90, 6.0]

  # --- Student sigma (row at y = 6.0, x_offset = +8.0, offset right) ---
  - type: graph
    params:
      id: s_sigma
      n: 2
      edges: none
      color: purple
      labels: ["\u03c3\u2081", "\u03c3\u2082"]
      size: small
      positions:
        - [9.50, 6.0]
        - [10.10, 6.0]

  # --- Student z (row at y = 8.0, x_offset = +8.0) ---
  - type: graph
    params:
      id: s_z
      n: 2
      edges: none
      color: dqn
      labels: ["z\u2081", "z\u2082"]
      size: small
      positions:
        - [8.80, 8.0]
        - [9.40, 8.0]

  # --- Student decoder (unpinned) ---
  - type: box
    params:
      id: s_dec
      label: "z\u1d40z"
      color: grey

  # --- Student reconstructed: 3 fully-connected (y_offset = +12.0, x_offset = +8.0) ---
  - type: graph
    params:
      id: s_recon
      n: 3
      edges: full
      color: vgae
      labels: none
      size: small
      positions:
        - [8.38, 13.11]
        - [9.38, 13.12]
        - [8.88, 12.25]

edges:
  # === Teacher internal edges ===
  - {from: t_enc0.output, to: t_enc1.input, style: dashed, color: vgae}
  - {from: t_enc1.output, to: "t_mu.\u03bc\u2081", style: dashed, color: vgae}
  - {from: t_enc1.output, to: "t_sigma.\u03c3\u2081", style: dashed, color: vgae}
  - {from: "t_mu.\u03bc\u2082", to: "t_z.z\u2082", color: purple}
  - {from: "t_sigma.\u03c3\u2082", to: "t_z.z\u2082", color: purple}
  - {from: "t_z.z\u2083", to: t_dec, color: dqn}
  - {from: t_dec, to: t_recon.input, style: dashed, color: grey}

  # === Student internal edges ===
  - {from: s_enc0.output, to: s_enc1.input, style: dashed, color: vgae}
  - {from: s_enc1.output, to: "s_mu.\u03bc\u2081", style: dashed, color: vgae}
  - {from: s_enc1.output, to: "s_sigma.\u03c3\u2081", style: dashed, color: vgae}
  # Student has 2 latent dims: use node index 0 as "mid" for 2-node sets
  - {from: "s_mu.\u03bc\u2081", to: "s_z.z\u2081", color: purple}
  - {from: "s_sigma.\u03c3\u2081", to: "s_z.z\u2081", color: purple}
  - {from: "s_z.z\u2082", to: s_dec, color: dqn}
  - {from: s_dec, to: s_recon.input, style: dashed, color: grey}

  # === Knowledge Distillation edge (teacher output → student output) ===
  - from: t_recon.output
    to: s_recon.output
    style: dashed
    color: kd
    width: 2.0
    label: KD
