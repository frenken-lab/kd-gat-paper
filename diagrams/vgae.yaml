# VGAE autoencoder — encoder → mu/sigma → z → decoder → reconstructed
# neato layout: graph nodes pinned, box nodes placed by force-directed edges
prog: neato

# Position anchors (inches, from neato organic layout)
# full_5: 0=(0.38,0.73) 1=(1.54,0.62) 2=(0.92,0.25) 3=(0.66,1.39) 4=(1.38,1.32)
# full_3: 0=(0.38,1.11) 1=(1.38,1.12) 2=(0.88,0.25)

components:
  # --- Encoder layer 0: 5 fully-connected nodes (y_offset = 0) ---
  - type: graph
    params:
      id: enc0
      n: 5
      edges: full
      color: vgae
      labels: none
      size: small
      positions: &full5_y0
        - [0.38, 0.73]
        - [1.54, 0.62]
        - [0.92, 0.25]
        - [0.66, 1.39]
        - [1.38, 1.32]
    container: {label: "VGAE Model", color: vgae, style: dashed}

  # --- Encoder layer 1: 3 fully-connected nodes (y_offset = +3.0) ---
  - type: graph
    params:
      id: enc1
      n: 3
      edges: full
      color: vgae
      labels: none
      size: small
      positions: &full3_y3
        - [0.38, 4.11]
        - [1.38, 4.12]
        - [0.88, 3.25]

  # --- Mu parameters (row at y = 6.0) ---
  - type: graph
    params:
      id: mu
      n: 3
      edges: none
      color: purple
      labels: ["\u03bc\u2081", "\u03bc\u2082", "\u03bc\u2083"]
      size: small
      positions:
        - [0.30, 6.0]
        - [0.90, 6.0]
        - [1.50, 6.0]

  # --- Sigma parameters (row at y = 6.0, offset right) ---
  - type: graph
    params:
      id: sigma
      n: 3
      edges: none
      color: purple
      labels: ["\u03c3\u2081", "\u03c3\u2082", "\u03c3\u2083"]
      size: small
      positions:
        - [2.10, 6.0]
        - [2.70, 6.0]
        - [3.30, 6.0]

  # --- Latent z samples (row at y = 8.0) ---
  - type: graph
    params:
      id: z
      n: 3
      edges: none
      color: dqn
      labels: ["z\u2081", "z\u2082", "z\u2083"]
      size: small
      positions:
        - [0.60, 8.0]
        - [1.20, 8.0]
        - [1.80, 8.0]

  # --- Decoder box (unpinned) ---
  - type: box
    params:
      id: dec
      label: "z\u1d40z"
      color: grey

  # --- Reconstructed graph: 5 fully-connected nodes (y_offset = +12.0) ---
  - type: graph
    params:
      id: recon
      n: 5
      edges: full
      color: vgae
      labels: none
      size: small
      positions:
        - [0.38, 12.73]
        - [1.54, 12.62]
        - [0.92, 12.25]
        - [0.66, 13.39]
        - [1.38, 13.32]

edges:
  # Encoder: enc0 rightmost (node 1, x=1.54) → enc1 leftmost (node 0, x=0.38)
  - {from: enc0.output, to: enc1.input, style: dashed, color: vgae}

  # Encoder → mu/sigma (dashed)
  - {from: enc1.output, to: "mu.\u03bc\u2081", style: dashed, color: vgae}
  - {from: enc1.output, to: "sigma.\u03c3\u2081", style: dashed, color: vgae}

  # Mu middle → z middle
  - {from: "mu.\u03bc\u2082", to: "z.z\u2082", color: purple}
  # Sigma middle → z middle
  - {from: "sigma.\u03c3\u2082", to: "z.z\u2082", color: purple}

  # z last → decoder
  - {from: "z.z\u2083", to: dec, color: dqn}

  # Decoder → reconstructed first (dashed)
  - {from: dec, to: recon.input, style: dashed, color: grey}
