# Full KD-GAT pipeline: Input → VGAE (KD) → GAT (KD) → DQN → Output
# Uses simplified box components for the overview diagram.
# Detailed component internals are in vgae.yaml, gat.yaml, etc.
direction: horizontal
ranksep: 1.5
nodesep: 0.8
bgcolor: white

components:
  # Input CAN bus graph
  - type: graph
    params:
      n: 5
      layout: organic
      edges: sparse
      color: data
      labels: ["0x1A0", "0x2B3", "0x3C1", "0x4D5", "0x5E2"]
      id: input

  # VGAE teacher
  - type: box
    params:
      id: vgae_t
      label: "VGAE Teacher"
      color: vgae

  # GAT teacher
  - type: box
    params:
      id: gat_t
      label: "GAT Teacher"
      color: gat

  # DQN fusion
  - type: box
    params:
      id: dqn
      label: "DQN Fusion"
      color: dqn

  # Output
  - type: box
    params:
      id: output
      label: "Anomaly Score"
      color: data

  # VGAE student
  - type: box
    params:
      id: vgae_s
      label: "VGAE Student"
      color: vgae
    place:
      below: vgae_t

  # GAT student
  - type: box
    params:
      id: gat_s
      label: "GAT Student"
      color: gat
    place:
      below: gat_t

edges:
  # Main pipeline
  - from: input.output
    to: vgae_t.input
    color: "#BAB0AC"

  - from: vgae_t.output
    to: gat_t.input
    color: "#BAB0AC"
    label: "hard samples"

  - from: vgae_t.output
    to: dqn.input
    color: "#BAB0AC"
    label: "recon error"

  - from: gat_t.output
    to: dqn.input
    color: "#BAB0AC"
    label: "classification"

  - from: dqn.output
    to: output.input
    color: "#BAB0AC"

  # Knowledge distillation arrows (dashed, red)
  - from: vgae_t.output
    to: vgae_s.input
    style: dashed
    color: "#E15759"
    label: "KD"
    constraint: false

  - from: gat_t.output
    to: gat_s.input
    style: dashed
    color: "#E15759"
    label: "KD"
    constraint: false

  # Student outputs feed into DQN too
  - from: vgae_s.output
    to: dqn.input
    color: "#BAB0AC"
    style: dashed

  - from: gat_s.output
    to: dqn.input
    color: "#BAB0AC"
    style: dashed
