# Full KD-GAT pipeline: Input → VGAE (KD) → GAT (KD) → DQN → Output
# neato layout: positions define horizontal pipeline, students below teachers
prog: neato
bgcolor: white

components:
  # Input CAN bus graph
  - type: graph
    params:
      n: 5
      edges: sparse
      color: data
      labels: ["0x1A0", "0x2B3", "0x3C1", "0x4D5", "0x5E2"]
      size: medium
      id: input
      positions:
        - [1.86, 2.25]
        - [1.85, 1.25]
        - [0.94, 1.67]
        - [0.38, 2.60]
        - [1.29, 3.17]

  # Pipeline boxes — horizontal row at y=2.0
  - type: box
    params: {id: vgae_t, label: "VGAE Teacher", color: vgae}
  - type: box
    params: {id: gat_t, label: "GAT Teacher", color: gat}
  - type: box
    params: {id: dqn, label: "DQN Fusion", color: dqn}
  - type: box
    params: {id: output, label: "Anomaly Score", color: data}

  # Student boxes — below teachers at y=4.5
  - type: box
    params: {id: vgae_s, label: "VGAE Student", color: vgae}
  - type: box
    params: {id: gat_s, label: "GAT Student", color: gat}

edges:
  # Main pipeline (left to right)
  - {from: input.output, to: vgae_t, color: grey}
  - {from: vgae_t, to: gat_t, color: grey, label: "hard samples"}
  - {from: vgae_t, to: dqn, color: grey, label: "recon error"}
  - {from: gat_t, to: dqn, color: grey, label: "classification"}
  - {from: dqn, to: output, color: grey}

  # Knowledge distillation (dashed, red)
  - {from: vgae_t, to: vgae_s, style: dashed, color: kd, label: "KD"}
  - {from: gat_t, to: gat_s, style: dashed, color: kd, label: "KD"}

  # Student outputs feed into DQN
  - {from: vgae_s, to: dqn, color: grey, style: dashed}
  - {from: gat_s, to: dqn, color: grey, style: dashed}
