# GAT classifier — 3 attention layers → JK Concat → FC
# neato layout: graph nodes pinned, box nodes placed by force-directed edges
prog: neato

# Reusable position anchors (inches, from neato organic layout)
# sparse_5 nodes: 0=(1.86,1.25) 1=(1.85,0.25) 2=(0.94,0.67) 3=(0.38,1.6) 4=(1.29,2.17)
# Rightmost = node 0 (x=1.86), Leftmost = node 3 (x=0.38)

components:
  # --- Layer 0 (y_offset = 0) ---
  - type: graph
    params:
      id: gat_L0
      n: 5
      edges: sparse
      color: gat
      directed: true
      labels: ["v\u2081", "v\u2082", "v\u2083", "v\u2084", "v\u2085"]
      size: small
      positions: &sparse5_y0
        - [1.86, 1.25]
        - [1.85, 0.25]
        - [0.94, 0.67]
        - [0.38, 1.60]
        - [1.29, 2.17]
    container: {label: "GAT Model", color: gat, style: dashed}

  # --- Layer 1 (y_offset = +3.0) ---
  - type: graph
    params:
      id: gat_L1
      n: 5
      edges: sparse
      color: gat
      directed: true
      labels: ["v\u2081", "v\u2082", "v\u2083", "v\u2084", "v\u2085"]
      size: small
      positions: &sparse5_y3
        - [1.86, 4.25]
        - [1.85, 3.25]
        - [0.94, 3.67]
        - [0.38, 4.60]
        - [1.29, 5.17]

  # --- Layer 2 (y_offset = +6.0) ---
  - type: graph
    params:
      id: gat_L2
      n: 5
      edges: sparse
      color: gat
      directed: true
      labels: ["v\u2081", "v\u2082", "v\u2083", "v\u2084", "v\u2085"]
      size: small
      positions: &sparse5_y6
        - [1.86, 7.25]
        - [1.85, 6.25]
        - [0.94, 6.67]
        - [0.38, 7.60]
        - [1.29, 8.17]

  # --- JK Concat (unpinned — pulled into position by edges) ---
  - type: box
    params:
      id: jk
      label: "JK Concat"
      color: gat

  # --- FC output (unpinned — pulled into position by edges) ---
  - type: box
    params:
      id: fc
      label: "FC \u2192 class"
      color: gat

edges:
  # Inter-layer dashed connectors: rightmost (node 0, x=1.86) → leftmost (node 3, x=0.38)
  - {from: "gat_L0.v\u2081", to: "gat_L1.v\u2084", style: dashed, color: gat}
  - {from: "gat_L1.v\u2081", to: "gat_L2.v\u2084", style: dashed, color: gat}

  # Each layer output → JK (dashed)
  - {from: "gat_L0.v\u2085", to: jk, style: dashed, color: gat}
  - {from: "gat_L1.v\u2085", to: jk, style: dashed, color: gat}
  - {from: "gat_L2.v\u2085", to: jk, style: dashed, color: gat}

  # JK → FC (solid)
  - {from: jk, to: fc, color: gat}
