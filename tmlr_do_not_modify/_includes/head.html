    <script>
      window.addEventListener("load", function() {
         setTimeout(function() { if(window.Prism) window.Prism.highlightAll(); }, 500);
      });

      document.addEventListener('click', function(e) {
        const target = e.target.closest('a');
        if (target && target.getAttribute('href') && target.getAttribute('href').startsWith('#')) {
          e.preventDefault();
          const id = target.getAttribute('href').slice(1);
          const element = document.getElementById(id);
          if (element) {
            const y = element.getBoundingClientRect().top + window.scrollY - 70;
            window.scrollTo({ top: y, behavior: 'smooth' });
          }
        }
      });
    </script>

    <style type="text/css">
        /* Base styling for TOC on wide screens (> 1024px) */
        d-article d-contents {
          align-self: start;
          grid-column: 1 / 4;
          grid-row: auto / span 4;
          justify-self: end;
          margin-top: 0em;
          padding-left: 2em;
          padding-right: 3em;
          border-right: 1px solid rgba(0,0,0,0.1);

          margin-right: 0px;
          display: grid;
          grid-template-columns: minmax(8px, 1fr) [toc] auto minmax(8px, 1fr) [toc-line] 1px minmax(32px, 2fr);
        }
        d-article d-contents nav {
          grid-column: toc;
        }
        d-article d-contents nav a {

          text-decoration: none;

        }
        d-article d-contents nav a:hover {
