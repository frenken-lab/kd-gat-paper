version: 1
project:
  title: "Adaptive Fusion of Graph-Based Ensembles for Automotive Intrusion Detection"
  subtitle: "PhD Candidacy Report"
  authors:
    - name: Robert Frenken
      affiliation: The Ohio State University
  committee:
    - name: Qadeer Ahmed
      role: Primary Advisor
      affiliation: The Ohio State University
    - name: Sidra Ghayour Bhatti
      affiliation: The Ohio State University
    - name: Andrew Perrault
      affiliation: The Ohio State University
    - name: Anish Arora
      affiliation: The Ohio State University
    - name: Jia (Kevin) Liu
      affiliation: The Ohio State University
  keywords:
