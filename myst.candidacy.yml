  exports:
    - format: typst
      template: plain_typst_book
      output: _build/exports/candidacy-report.pdf
      id: candidacy-pdf
      articles:
        - paper/candidacy/index.md
        - paper/candidacy/introduction.md
        - paper/content/related-work.md
        - paper/content/background.md
