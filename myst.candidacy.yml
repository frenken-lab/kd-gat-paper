        - paper/content/methodology.md
        - paper/content/experiments.md
        - paper/content/results.md
        - paper/content/ablation.md
        - paper/content/explainability.md
        - paper/candidacy/proposed-research.md
        - paper/candidacy/broader-impact.md
        - paper/candidacy/committee-questions/index.md
        - paper/candidacy/committee-questions/physics-dynamics.md
        - paper/candidacy/committee-questions/interpretability-calibration.md
        - paper/candidacy/committee-questions/federated-optimization.md
        - paper/candidacy/committee-questions/reinforcement-learning.md
        - paper/content/conclusion.md
        - paper/content/appendix/architecture.md
        - paper/content/appendix/figures.md
        - paper/candidacy/appendix.md
      options:
        show_pagenumber: true
        show_ToC: true
        ToC_depth: 3
        papersize: us-letter
  toc:
    - file: paper/candidacy/index.md
    - file: paper/candidacy/current-framework.md
    - file: paper/candidacy/proposed-combined.md
    - file: paper/candidacy/committee-questions/index.md
      children:
        - file: paper/candidacy/committee-questions/physics-dynamics.md
        - file: paper/candidacy/committee-questions/interpretability-calibration.md
        - file: paper/candidacy/committee-questions/federated-optimization.md
        - file: paper/candidacy/committee-questions/reinforcement-learning.md
    - file: paper/content/conclusion.md
    - file: paper/candidacy/appendix-combined.md

site:
  template: article-theme
  domains:
    - rob.curve.space
  downloads:
    - id: candidacy-pdf
      title: Download PDF
  options:
    hide_outline: true
    css:
      - _static/custom.css
