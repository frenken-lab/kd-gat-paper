version: 1
project:
  title: "Adaptive Fusion of Graph-Based Ensembles for Automotive Intrusion Detection"
  subtitle: "PhD Candidacy Report"
  authors:
    - name: Robert Frenken
      affiliation: The Ohio State University
    - name: Hanqin Zhang
      affiliation: The Ohio State University
    - name: Sidra Ghayour Bhatti
      affiliation: The Ohio State University
    - name: Qadeer Ahmed
      affiliation: The Ohio State University
  keywords:
    - Machine Learning
    - Graph Neural Networks
    - Ensemble Learning
    - Intrusion Detection
    - Physics-Informed Neural Networks
    - Explainable AI
  bibliography:
    - references/own.bib
    - references/can_ids.bib
    - references/gnn.bib
    - references/kd.bib
    - references/rl.bib
    - references/vgae.bib
    - references/datasets.bib
    - references/curriculum.bib
    - references/cross_domain.bib
    - references/infrastructure.bib
    - references/background.bib
    - references/loss.bib
    - references/candidacy.bib
  exports:
    - format: typst
      template: plain_typst_book
      output: _build/exports/candidacy-report.pdf
      articles:
        - candidacy/index.md
        - candidacy/introduction.md
        - content/background.md
        - candidacy/background.md
        - content/related-work.md
        - content/methodology.md
        - content/experiments.md
        - content/results.md
        - content/ablation.md
        - content/explainability.md
        - candidacy/proposed-research.md
        - candidacy/broader-impact.md
        - content/conclusion.md
        - content/appendix/architecture.md
        - content/appendix/figures.md
        - candidacy/appendix.md
      options:
        show_pagenumber: true
        show_ToC: true
        ToC_depth: 3
        papersize: us-letter
  toc:
    - file: candidacy/index.md
    - file: candidacy/current-framework.md
    - file: candidacy/proposed-combined.md
    - file: content/conclusion.md
    - file: candidacy/appendix-combined.md

site:
  template: article-theme
  domains:
    - rob.curve.space
  options:
    css:
      - _static/custom.css
